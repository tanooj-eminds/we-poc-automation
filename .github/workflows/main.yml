name: PR and Push Tests

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:

  run-all-tests:
    name: Run All Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright Chromium browser
        run: npx playwright install chromium --with-deps

      - name: Run all tests
        id: run_tests
        continue-on-error: true
        env:
          BASE_URL:      ${{ secrets.BASE_URL }}
          API_BASE_URL:  ${{ secrets.API_BASE_URL }}
          Yopmail_URL:   ${{ secrets.YOPMAIL_URL }}
          ui_email:      ${{ secrets.UI_EMAIL }}
          ui_password:   ${{ secrets.UI_PASSWORD }}
          api_email:     ${{ secrets.API_EMAIL }}
          api_password:  ${{ secrets.API_PASSWORD }}
        run: |
          npx playwright test \
            --reporter=list \
            2>&1 | tee test_output.txt

      - name: Parse test results
        id: parse
        run: |
          OUTPUT=$(cat test_output.txt 2>/dev/null || echo "")

          PASSED=$(echo "$OUTPUT"  | grep -oP '\d+(?= passed)'  | tail -1 || echo "0")
          FAILED=$(echo "$OUTPUT"  | grep -oP '\d+(?= failed)'  | tail -1 || echo "0")
          SKIPPED=$(echo "$OUTPUT" | grep -oP '\d+(?= skipped)' | tail -1 || echo "0")

          PASSED=${PASSED:-0}
          FAILED=${FAILED:-0}
          SKIPPED=${SKIPPED:-0}
          TOTAL=$((PASSED + FAILED + SKIPPED))

          echo "passed=$PASSED"   >> $GITHUB_OUTPUT
          echo "failed=$FAILED"   >> $GITHUB_OUTPUT
          echo "skipped=$SKIPPED" >> $GITHUB_OUTPUT
          echo "total=$TOTAL"     >> $GITHUB_OUTPUT

          if [ "$FAILED" -gt "0" ]; then
            echo "status=FAILED" >> $GITHUB_OUTPUT
          else
            echo "status=PASSED" >> $GITHUB_OUTPUT
          fi

      - name: Generate HTML report
        if: always()
        continue-on-error: true
        env:
          BASE_URL:      ${{ secrets.BASE_URL }}
          API_BASE_URL:  ${{ secrets.API_BASE_URL }}
          Yopmail_URL:   ${{ secrets.YOPMAIL_URL }}
          ui_email:      ${{ secrets.UI_EMAIL }}
          ui_password:   ${{ secrets.UI_PASSWORD }}
          api_email:     ${{ secrets.API_EMAIL }}
          api_password:  ${{ secrets.API_PASSWORD }}
        run: |
          npx playwright test \
            --reporter=html \
            2>/dev/null || true

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Test-Report-Run-${{ github.run_number }}
          path: playwright-report/
          retention-days: 5

      - name: Upload test result screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Test-Screenshots-Run-${{ github.run_number }}
          path: test-results/
          retention-days: 5

      - name: Comment result on Pull Request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const passed  = '${{ steps.parse.outputs.passed }}';
            const failed  = '${{ steps.parse.outputs.failed }}';
            const skipped = '${{ steps.parse.outputs.skipped }}';
            const total   = '${{ steps.parse.outputs.total }}';
            const status  = '${{ steps.parse.outputs.status }}';
            const runUrl  = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;

            const icon   = status === 'PASSED' ? '✅' : '❌';
            const header = status === 'PASSED'
              ? '## ✅ All Tests Passed!'
              : '## ❌ Some Tests Failed!';

            const body = `
            ${header}

            | Result | Count |
            |--------|-------|
            | ✅ Passed  | **${passed}**  |
            | ❌ Failed  | **${failed}**  |
            | ⏭️ Skipped | **${skipped}** |
            | 📊 Total   | **${total}**   |

            [📋 View Full Report & Screenshots](${runUrl})

            > Triggered by commit \`${{ github.sha }}\` on branch \`${{ github.head_ref }}\`
            `;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body.trim()
            });
